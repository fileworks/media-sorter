name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # allow manually triggering CI checks

# Cancel any in-flight run for the same branch/PR so pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend: lint / typecheck / test ────────────────────────────────────────
  backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libjpeg-dev libpng-dev

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        working-directory: backend
        run: python -m ruff check app tests

      - name: Format check — ruff
        working-directory: backend
        run: python -m ruff format --check app tests

      - name: Type-check — mypy
        working-directory: backend
        run: python -m mypy app

      - name: Run tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml

  # ── Frontend: typecheck / build ──────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # No Rust needed here: `tsc --noEmit` and `vite build` are pure TS/JS steps.
      # Tauri TS types come from the @tauri-apps/api npm package, not Rust compilation.
      # Rust is only needed for `make build-tauri` (the release jobs).

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint — ESLint
        working-directory: frontend
        run: npm run lint

      - name: Format check — Prettier
        working-directory: frontend
        run: npm run format:check

      - name: Type-check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build (Vite — no Tauri binary needed in CI)
        working-directory: frontend
        run: npm run build

  # ── Tauri: config schema + Rust type-check ───────────────────────────────────
  # cargo check runs tauri-build's build.rs, which validates tauri.conf.json
  # against the schema — catching bad config values before a full release build.
  # No binary is produced; completes in ~2 min with the Rust cache warm.
  tauri:
    name: Tauri — config + Rust check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check Rust + validate tauri.conf.json
        working-directory: frontend/src-tauri
        run: cargo check
