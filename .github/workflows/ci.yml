name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # allow manually triggering CI checks

# Cancel any in-flight run for the same branch/PR so pushes don't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend: lint / typecheck / test ────────────────────────────────────────
  backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libjpeg-dev libpng-dev

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        working-directory: backend
        run: python -m ruff check app tests

      - name: Format check — ruff
        working-directory: backend
        run: python -m ruff format --check app tests

      - name: Type-check — mypy
        working-directory: backend
        run: python -m mypy app

      - name: Run tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml

  # ── Frontend: typecheck / build ──────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # No Rust needed here: `tsc --noEmit` and `vite build` are pure TS/JS steps.
      # Tauri TS types come from the @tauri-apps/api npm package, not Rust compilation.
      # Rust is only needed for `make build-tauri` (the release jobs).

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint — ESLint
        working-directory: frontend
        run: npm run lint

      - name: Format check — Prettier
        working-directory: frontend
        run: npm run format:check

      - name: Type-check (tsc --noEmit)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build (Vite — no Tauri binary needed in CI)
        working-directory: frontend
        run: npm run build

      - name: Validate tauri.conf.json schema
        working-directory: frontend
        run: |
          pip install jsonschema --quiet --disable-pip-version-check
          python3 - <<'EOF'
          import json, jsonschema, sys
          schema = json.load(open("node_modules/@tauri-apps/cli/schema.json"))
          config = json.load(open("src-tauri/tauri.conf.json"))
          try:
              jsonschema.validate(config, schema)
              print("tauri.conf.json is valid")
          except jsonschema.ValidationError as e:
              path = " > ".join(str(p) for p in e.absolute_path)
              print(f"ERROR in tauri.conf.json at '{path}': {e.message}", file=sys.stderr)
              sys.exit(1)
          EOF
