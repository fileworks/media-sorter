<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>MediaSorter</title>

    <!--
      Apply the persisted (or OS) theme before first paint. Mirrors
      useTheme.getInitialTheme() so the app doesn't flash light→dark on load for
      dark-mode users, and so the startup splash below matches the real theme.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("mediasort_theme");
          if (t !== "dark" && t !== "light") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage unavailable — fall back to light */
        }
      })();
    </script>

    <!--
      Startup splash. Rendered from static HTML so it appears the instant the
      document paints — before the JS bundle parses or React mounts — so the user
      never sees a blank white screen. React's createRoot().render() replaces the
      contents of #root on first commit, which removes this automatically.
      Theme-aware and reduced-motion aware; uses no external CSS/JS.
    -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #ffffff;
        color: hsl(222 47% 11%);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        z-index: 9999;
      }
      html.dark #app-splash {
        background: hsl(20 15% 10%);
        color: hsl(30 20% 96%);
      }
      .app-splash__spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid hsl(25 20% 88%);
        border-top-color: hsl(25 95% 53%);
        animation: app-splash-spin 0.8s linear infinite;
      }
      html.dark .app-splash__spinner {
        border-color: hsl(20 15% 22%);
        border-top-color: hsl(25 95% 58%);
      }
      .app-splash__title {
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .app-splash__hint {
        font-size: 0.8rem;
        opacity: 0.6;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__spinner {
          animation-duration: 1.8s;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash" role="status" aria-live="polite" aria-label="Loading MediaSorter">
        <div class="app-splash__spinner"></div>
        <div class="app-splash__title">MediaSorter</div>
        <div class="app-splash__hint">Starting up…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
